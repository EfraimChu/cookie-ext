<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>API Recorder — Cert Keeper</title>
<link rel="stylesheet" href="recorder.css">
</head>
<body>

<header class="toolbar">
  <div class="tb-left">
    <h1>🎬 API Recorder</h1>
    <span class="stats" id="stats">0 requests</span>
  </div>
  <div class="tb-right">
    <button class="tb-btn tb-export" id="btnExport">📥 Export JSON</button>
    <button class="tb-btn tb-skill" id="btnSkill">🧩 Generate Skill</button>
    <button class="tb-btn tb-save" id="btnSave">💾 Save to Disk</button>
    <button class="tb-btn tb-clear" id="btnClear">🗑</button>
    <button class="tb-btn tb-theme" id="btnTheme" title="切换深色模式">🌙</button>
  </div>
</header>

<div class="filter-bar">
  <input class="filter-input" id="filterInput" placeholder="🔍 搜索 URL / path …">
  <div class="method-chips" id="methodChips">
    <span class="chip active" data-m="ALL">ALL</span>
    <span class="chip" data-m="GET">GET</span>
    <span class="chip" data-m="POST">POST</span>
    <span class="chip" data-m="PUT">PUT</span>
    <span class="chip" data-m="DELETE">DEL</span>
  </div>
  <button class="tb-btn tb-batch" id="btnSelectAll">☑ 全选</button>
</div>

<div class="filter-bar filter-bar2">
  <label class="toggle-label"><input type="checkbox" id="ckNoise" checked> 过滤噪音</label>
  <div class="group-chips" id="groupChips">
    <span class="gchip active" data-g="none">不分组</span>
    <span class="gchip" data-g="domain">按域名</span>
    <span class="gchip" data-g="time">按时间段</span>
  </div>
</div>

<div class="domain-bar" id="domainChips"></div>

<div class="batch-bar" id="batchBar">
  <span>已选 <b id="batchCount">0</b> 条</span>
  <button class="abtn abtn-batch-curl" id="btnBatchCurl">📋 复制 cURL</button>
  <button class="abtn abtn-del" id="btnBatchDel">🗑 删除选中</button>
</div>

<div class="view-toggle" id="viewToggle">
  <button class="vt-btn active" data-v="list">📋 列表</button>
  <button class="vt-btn" data-v="timeline">⏱ 时间线</button>
</div>

<div class="timeline-container" id="timelineContainer" style="display:none"></div>

<main class="content" id="content">
  <div class="empty">
    <div class="empty-icon">🎬</div>
    <h3>暂无录制数据</h3>
    <p>在 Cert Keeper 弹窗中点击 ● REC，然后操作页面</p>
  </div>
</main>

<!-- Skill generation modal -->
<div class="modal-overlay" id="skillModal">
  <div class="modal">
    <div class="modal-header">
      <h2>🧩 生成 Cursor Skill</h2>
      <button class="modal-close" id="skillModalClose">✕</button>
    </div>
    <div class="modal-body">
      <label>Skill 名称</label>
      <input id="skillName" value="" placeholder="如: create-order-flow">
      <label>描述</label>
      <input id="skillDesc" placeholder="如: 创建订单的完整 API 链路">
      <label>你的诉求 / 需求</label>
      <textarea id="skillRequirements" rows="3" placeholder="描述你希望这个 Skill 做什么，如：&#10;自动化查询库存并导出报表，支持按市场和日期范围筛选"></textarea>
      <label>包含的 API 步骤 <small id="skillStepCount"></small></label>
      <div class="skill-preview" id="skillPreview"></div>
    </div>
    <div class="modal-footer">
      <button class="tb-btn tb-skill" id="btnSkillGenerate">🚀 生成 Skill</button>
      <button class="tb-btn tb-export" id="btnSkillCopy">📋 复制 Markdown</button>
      <button class="tb-btn tb-save" id="btnSkillDownload">📥 下载 .md</button>
    </div>
    <div class="modal-status" id="skillGenStatus"></div>
  </div>
</div>

<div id="toastContainer"></div>

<script src="recorder.js"></script>
</body>
</html>
